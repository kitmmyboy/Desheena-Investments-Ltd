name: desheena_waste
description: Desheena Investments Ltd Waste Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  connectivity_plus: ^6.0.3
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  supabase_flutter: ^2.5.6
  uuid: ^4.4.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  path_provider: ^2.1.3
  path: ^1.9.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  url_launcher: ^6.3.0
  pushy_flutter: ^2.0.43
  flutter_local_notifications: ^17.1.2
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#ffffff"
  image: "assets/app_logo.png"
  android_12:
    image: "assets/app_logo.png"
    color: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
